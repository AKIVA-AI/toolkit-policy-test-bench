name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
      - 'Dockerfile'
      - 'requirements-dev.txt'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
      - 'Dockerfile'
      - 'requirements-dev.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - run: pip install -e ".[dev]"
    - run: pytest --cov=toolkit_policy_test_bench --cov-report=xml --cov-fail-under=70 -v
    - uses: codecov/codecov-action@v6
      if: matrix.python-version == '3.11'
      with:
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install bandit pip-audit
    - run: bandit -r src/
    - run: pip-audit

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install ruff
    - run: ruff check .

  sbom:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install cyclonedx-bom
    - run: pip install -e ".[dev]"
    - run: cyclonedx-py environment -o sbom.json --output-format json
    - uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pdoc
    - run: pip install -e ".[dev]"
    - run: pdoc toolkit_policy_test_bench -o docs/api/ --docformat google
    - uses: actions/upload-artifact@v4
      with:
        name: api-docs
        path: docs/api/

  build:
    runs-on: ubuntu-latest
    needs: [test, security, lint, sbom]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - run: pip install build "twine<6"
    - run: python -m build
    - name: Check package metadata
      run: twine check dist/*
